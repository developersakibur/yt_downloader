<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>YT Downloader Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
        <h1>YouTube Downloader</h1>
        <input type="text" id="videoUrl" placeholder="Enter YouTube video URL">
        <div class="radio-row">
            <div class="radio-group-container" id="quantity-container">
                <p class="radio-group-title">Quantity</p>
                <div class="radio-group">
                    <input type="radio" id="quantity_25" name="quantity" value="25" checked>
                    <label for="quantity_25">25</label>
                    <input type="radio" id="quantity_50" name="quantity" value="50">
                    <label for="quantity_50">50</label>
                    <input type="radio" id="quantity_75" name="quantity" value="75">
                    <label for="quantity_75">75</label>
                    <input type="radio" id="quantity_100" name="quantity" value="100">
                    <label for="quantity_100">100</label>
                </div>
            </div>
            <div class="radio-group-container" id="playlistRow" style="display: none;">
                <p class="radio-group-title">Playlist</p>
                <div class="radio-group">
                    <input type="radio" id="playlist_no" name="playlist" value="no" checked>
                    <label for="playlist_no">No</label>
                    <input type="radio" id="playlist_yes" name="playlist" value="yes">
                    <label for="playlist_yes">Yes</label>
                </div>
            </div>
            <div class="radio-group-container">
                <p class="radio-group-title">Format</p>
                <div class="radio-group">
                    <input type="radio" id="format_mp3" name="format" value="MP3">
                    <label for="format_mp3">MP3</label>
                    <input type="radio" id="format_3gp" name="format" value="3GP">
                    <label for="format_3gp">3GP</label>
                    <input type="radio" id="format_mp4" name="format" value="MP4" checked>
                    <label for="format_mp4">MP4</label>
                </div>
            </div>
        </div>
        <button id="downloadBtn" class="primary">Download</button>

    <section class="progress">
      <h3>Progress</h3>
      <pre id="progressBox"></pre>
    </section>
  </div>

  <script src="app.js"></script>
</body>
</html>
