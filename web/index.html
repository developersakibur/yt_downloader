<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <title>YT Downloader Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="container">
    <h1>YouTube Downloader</h1>
    
    <section class="form">
      <input type="text" id="videoUrl" placeholder="Enter YouTube video URL">
      <div id="youtube-form" class="hidden">
        <div class="radio-group">
          <label><input type="radio" name="format" value="MP3"> MP3</label>
          <label><input type="radio" name="format" value="3GP"> 3GP</label>
          <label><input type="radio" name="format" value="MP4" checked> MP4</label>
        </div>
        <div id="quantity-row" class="radio-group hidden">
          <label><input type="radio" name="quantity" value="25" checked> 25</label>
          <label><input type="radio" name="quantity" value="50"> 50</label>
          <label><input type="radio" name="quantity" value="75"> 75</label>
          <label><input type="radio" name="quantity" value="100"> 100</label>
        </div>
        <div id="playlist-row" class="radio-group hidden">
          <label><input type="radio" name="playlist" value="no" checked> No</label>
          <label><input type="radio" name="playlist" value="yes"> Yes</label>
        </div>
        <button id="downloadBtn" class="primary">Download</button>
    </section>

    <section class="progress">
      <h3>Progress</h3>
      <pre id="progressBox"></pre>
    </section>

    <section class="downloaded-files">
      <h3>Downloaded Files</h3>
      <ul id="downloaded-files"></ul>
    </section>
  </div>

  <script src="app.js"></script>
</body>

</html>
